<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visa Dolphins Gallery — Training photos, competition moments, and more.">
    <title>Gallery — Visa Dolphins</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="site-header"></div>

    <main>
        <!-- ===========================
             PAGE HERO
             =========================== -->
        <section class="page-hero">
            <div class="container">
                <span class="hero-badge">VISA DOLPHINS</span>
                <h1 class="page-hero__title">Photo <span class="text-accent">Gallery</span></h1>
                <p class="page-hero__desc">Moments from training, competition, and our SwimKenya School programmes.</p>
            </div>
        </section>

        <!-- ===========================
             GALLERY
             =========================== -->
        <section class="section">
            <div class="container">
                <div class="gallery-filters">
                    <button class="gallery-filter active" data-filter="all">All</button>
                    <button class="gallery-filter" data-filter="training">Training</button>
                    <button class="gallery-filter" data-filter="competition">Competition</button>
                    <button class="gallery-filter" data-filter="school">School</button>
                </div>

                <div class="hex-grid" id="hex-grid">
                    <div class="hex-item" data-category="training" data-caption="Morning training session at Westlands Primary Pool">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1530549387789-4c1017266635?w=500&h=500&fit=crop" alt="Morning training session" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="competition" data-caption="Athletes at the start blocks — Kenyan National Championships">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1551969014-7d2c4cddf0b6?w=500&h=500&fit=crop" alt="Competition start blocks" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="training" data-caption="Freestyle technique drills during evening session">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=500&h=500&fit=crop" alt="Freestyle technique" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="school" data-caption="SwimKenya School — Stage 3 students learning backstroke">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1560090995-01632a28895b?w=500&h=500&fit=crop" alt="School programme backstroke" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="competition" data-caption="Relay team celebration after winning gold">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1519315901367-f34ff9154487?w=500&h=500&fit=crop" alt="Relay celebration" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="training" data-caption="Butterfly drills with Coach Japheth">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=500&h=500&fit=crop" alt="Butterfly drills" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="school" data-caption="Learn-to-swim class — building water confidence">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1575429198097-0414ec08e8cd?w=500&h=500&fit=crop" alt="Learn to swim class" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="competition" data-caption="Kiambu Invitational — 200m freestyle heat">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1622629797619-c100e3e67e2e?w=500&h=500&fit=crop" alt="200m freestyle heat" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="training" data-caption="Early morning Professional squad session at Kasarani">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=500&h=500&fit=crop" alt="Professional squad" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="school" data-caption="Stage 1 — First time in the deep end">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e?w=500&h=500&fit=crop" alt="First time deep end" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="competition" data-caption="Medal ceremony — Junior National Championships">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?w=500&h=500&fit=crop" alt="Medal ceremony" loading="lazy">
                        </div>
                    </div>
                    <div class="hex-item" data-category="training" data-caption="Kickboard drills — Novice programme">
                        <div class="hex-shape">
                            <img src="https://images.unsplash.com/photo-1504025468847-0e438279542c?w=500&h=500&fit=crop" alt="Kickboard drills" loading="lazy">
                        </div>
                    </div>
                </div>

                <p class="gallery-consent">All photos published with the consent of athletes and guardians.</p>
            </div>
        </section>

        <!-- ===========================
             LIGHTBOX MODAL
             =========================== -->
        <div class="lightbox" id="gallery-lightbox">
            <div class="lightbox__overlay"></div>
            <button class="lightbox__close" aria-label="Close">&times;</button>
            <button class="lightbox__prev" aria-label="Previous">&lsaquo;</button>
            <button class="lightbox__next" aria-label="Next">&rsaquo;</button>
            <div class="lightbox__content">
                <img class="lightbox__image" src="" alt="">
                <p class="lightbox__caption"></p>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>
    <script src="/js/main.js"></script>
</body>
</html>
